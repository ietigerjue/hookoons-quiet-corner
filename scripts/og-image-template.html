<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1200px; height: 630px;
    display: flex; align-items: center; justify-content: center;
    background-color: #FCFAF7;
    font-family: Georgia, "Songti SC", "SimSun", serif;
  }

  .card {
    width: 1080px; height: 540px;
    border: 1px solid #E6E6E3;
    border-radius: 24px;
    background-color: #F7F5F1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px 100px;
    position: relative;
  }

  .avatar {
    width: 88px; height: 88px;
    border-radius: 50%;
    background: linear-gradient(135deg, #EDEDEB 0%, #F7F7F5 100%);
    border: 2px solid #FFFFFF;
    box-shadow: 0 8px 24px -12px rgba(0,0,0,0.18);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 28px;
  }
  .avatar span {
    font-family: Georgia, "Songti SC", "SimSun", serif;
    font-size: 36px;
    color: #2F3437;
  }

  .vol {
    font-size: 13px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: #8F8F8F;
    margin-bottom: 24px;
  }

  .title {
    font-family: Georgia, "Songti SC", "SimSun", serif;
    font-size: 68px;
    font-weight: 500;
    color: #2F3437;
    letter-spacing: -0.5px;
    line-height: 1.08;
    margin-bottom: 20px;
  }

  .tagline {
    font-size: 19px;
    color: #4A4A4A;
    background: #d9d6d0;
    padding: 6px 16px;
    line-height: 1.6;
  }

  .subtitle {
    margin-top: 14px;
    font-size: 15px;
    color: #8F8F8F;
    background: #f0eeea;
    padding: 5px 14px;
    line-height: 1.5;
  }
</style>
</head>
<body>
<div class="card">
  <div class="avatar"><span>H</span></div>
  <div class="vol">Vol. 01 &middot; Personal Journal</div>
  <div class="title">Hookoon&rsquo;s Blog</div>
  <div class="tagline">Notes on AI, Materials Science, Price Action, and Personal Growth.</div>
  <div class="subtitle">A quiet space for structured thinking, experiments, and Al Brooks-inspired price action notes.</div>
</div>
</body>
</html>
